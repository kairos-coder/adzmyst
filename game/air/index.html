<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Aerie Vaults · Air Realm · Adzmyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════
     AIR REALM — THE AERIE VAULTS
     Room explorer, hidden objects, storm shards
     ═══════════════════════════════════════════════════════ */

  :root {
    --void:       #07080f;
    --deep:       #0a1528;
    --mid:        #1a3050;
    --sky:        #4a7aaa;
    --air:        #5ab8b0;
    --air-dim:    #2a5854;
    --cloud:      #8ab8c8;
    --silver:     #b8cce0;
    --breath:     #e8f2ff;
    --gold:       #c8a84a;
    --gold-dim:   #6a5830;
    --shard:      #7ad8d0;
    --decoy:      #8a7a6a;
    --danger:     #c85050;
    --unlock:     #8ad8a0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--void);
    color: var(--breath);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
  }

  /* ── LOADING VEIL ── */
  #loadingVeil {
    position: fixed; inset: 0; z-index: 100;
    background: var(--void);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    transition: opacity 0.5s ease;
  }
  #loadingVeil.hide { opacity: 0; pointer-events: none; }
  #loadingGlyph {
    font-size: 3rem;
    color: var(--air);
    animation: loadPulse 1.5s ease-in-out infinite;
  }
  @keyframes loadPulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  #loadingText {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem; letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--silver); opacity: 0.5;
  }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(7,8,15,0.9) 0%, transparent 100%);
    pointer-events: none;
  }
  #hud-left {
    display: flex; align-items: center; gap: 12px;
  }
  #hud-realm-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.8rem; letter-spacing: 3px;
    color: var(--breath);
  }
  #hud-room-name {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem; letter-spacing: 2px;
    color: var(--cloud); text-transform: uppercase;
    opacity: 0.7;
  }
  #hud-right {
    display: flex; align-items: center; gap: 8px;
    pointer-events: auto;
  }

  /* ── HUD BUTTONS ── */
  .hud-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid rgba(90,184,176,0.25);
    background: rgba(7,8,15,0.7);
    color: var(--cloud);
    cursor: pointer;
    border-radius: 14px;
    backdrop-filter: blur(4px);
    transition: all 0.3s;
    display: flex; align-items: center; gap: 4px;
  }
  .hud-btn:hover {
    border-color: var(--air);
    color: var(--breath);
    background: rgba(90,184,176,0.1);
  }
  .hud-btn .btn-icon { font-size: 0.8rem; }

  /* ── SAVE DOT ── */
  #saveDot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--air);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #saveDot.pulse {
    opacity: 1;
    animation: saveFlash 0.5s ease;
  }
  @keyframes saveFlash {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(2.5); }
  }

  /* ── MAIN CONTAINER ── */
  #realmContainer {
    position: fixed; inset: 0; z-index: 10;
    overflow: hidden;
    transition: opacity 0.4s ease;
  }
  #realmContainer.transitioning { opacity: 0; }

  /* ── ROOM ── */
  .room {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  /* ── ROOM BACKGROUND ── */
  .room-background {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: var(--deep);
    transition: background-image 0.6s ease;
  }
  .room-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(7,8,15,0.6) 100%);
    pointer-events: none;
  }

  /* ── HIDDEN OBJECTS ── */
  .hidden-objects-layer {
    position: absolute; inset: 0;
    z-index: 12; pointer-events: none;
  }
  .hidden-object {
    position: absolute;
    width: 40px; height: 40px;
    margin-left: -20px; margin-top: -20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    pointer-events: auto;
    border-radius: 50%;
    transition: all 0.3s ease;
    animation: objectGlow 3s ease-in-out infinite;
    z-index: 13;
  }
  .hidden-object:hover {
    transform: scale(1.3);
  }
  .hidden-object.shard {
    filter: drop-shadow(0 0 8px rgba(122,216,208,0.5));
  }
  .hidden-object.decoy {
    filter: drop-shadow(0 0 6px rgba(138,122,106,0.4));
  }
  .hidden-object.collected {
    animation: none;
    pointer-events: none;
    opacity: 0.7;
    filter: none;
  }

  @keyframes objectGlow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* ── ROOM INFO OVERLAY ── */
  .room-info {
    position: absolute; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    z-index: 14;
    text-align: center;
    pointer-events: none;
    max-width: 500px;
    width: 90%;
  }
  .room-header {
    margin-bottom: 6px;
  }
  .room-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 400;
    color: var(--breath);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    margin-bottom: 2px;
  }
  .room-id {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem; letter-spacing: 3px;
    color: var(--air); text-transform: uppercase;
    opacity: 0.6;
  }
  .room-description {
    font-size: 0.9rem; line-height: 1.6;
    color: var(--silver);
    font-style: italic;
    opacity: 0.8;
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
    margin-bottom: 12px;
  }

  /* ── SHARD PROGRESS ── */
  .shard-progress {
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .shard-dot {
    font-size: 1rem;
    color: var(--gold-dim);
    transition: all 0.3s;
  }
  .shard-dot.filled {
    color: var(--shard);
    animation: shardGlow 2s ease-in-out infinite;
  }
  @keyframes shardGlow {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(122,216,208,0.4)); }
    50% { filter: drop-shadow(0 0 10px rgba(122,216,208,0.8)); }
  }
  .shard-label {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem; letter-spacing: 2px;
    color: var(--silver); text-transform: uppercase;
    opacity: 0.5; margin-left: 6px;
  }

  /* ── PORTALS ── */
  .portals {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 14;
    display: flex; gap: 12px;
    flex-wrap: wrap; justify-content: center;
  }
  .portal-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid rgba(90,184,176,0.3);
    background: rgba(7,8,15,0.75);
    color: var(--cloud);
    cursor: pointer;
    border-radius: 20px;
    backdrop-filter: blur(4px);
    transition: all 0.3s;
    display: flex; align-items: center; gap: 6px;
    pointer-events: auto;
  }
  .portal-btn:hover {
    border-color: var(--air);
    color: var(--breath);
    background: rgba(90,184,176,0.15);
    box-shadow: 0 0 16px rgba(90,184,176,0.15);
  }
  .portal-icon {
    font-size: 0.9rem;
  }
  .portal-label {
    white-space: nowrap;
  }

  /* Exit portal */
  .exit-portal {
    border-color: rgba(200,168,74,0.4);
    color: var(--gold);
  }
  .exit-portal:hover {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(200,168,74,0.2);
  }
  .exit-portal.locked {
    border-color: rgba(74,58,42,0.4);
    color: var(--gold-dim);
    cursor: not-allowed;
  }
  .exit-portal.locked:hover {
    box-shadow: none;
    background: rgba(7,8,15,0.75);
  }
  .portal-requirement {
    font-size: 0.45rem;
    letter-spacing: 1px;
    color: var(--gold-dim);
    opacity: 0.7;
    display: block;
  }

  /* ── INVENTORY ── */
  #inventory {
    position: fixed; bottom: 100px; right: 16px; z-index: 25;
    pointer-events: none;
    display: flex; flex-direction: column; gap: 8px;
    background: rgba(7,8,15,0.7);
    border: 1px solid rgba(90,184,176,0.2);
    border-radius: 16px;
    padding: 10px 14px;
    backdrop-filter: blur(4px);
  }
  .inventory-section {
    display: flex; align-items: center; gap: 8px;
  }
  .inventory-label {
    font-family: 'Cinzel', serif;
    font-size: 0.45rem; letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--silver); opacity: 0.5;
    min-width: 50px; text-align: right;
  }
  .inventory-items {
    display: flex; gap: 4px;
  }
  .inv-item {
    font-size: 0.9rem;
  }
  .inv-item.shard {
    filter: drop-shadow(0 0 4px rgba(122,216,208,0.5));
  }
  .inv-empty {
    font-family: 'Cinzel', serif;
    font-size: 0.45rem; letter-spacing: 1px;
    color: var(--gold-dim); opacity: 0.4;
    font-style: italic;
  }

  /* ── TOAST ── */
  .realm-toast {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    background: rgba(7,8,15,0.9);
    border: 1px solid rgba(90,184,176,0.4);
    color: var(--breath);
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .realm-toast.show { opacity: 1; }

  /* ── MODALS ── */
  .modal {
    position: fixed; inset: 0; z-index: 60;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(7,8,15,0.85);
    backdrop-filter: blur(6px);
  }
  .modal-content {
    background: rgba(13,18,37,0.95);
    border: 1px solid rgba(90,184,176,0.25);
    border-radius: 20px;
    padding: 24px;
    max-width: 500px;
    width: 90%;
    max-height: 70vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 12px; right: 16px;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    background: transparent;
    border: none;
    color: var(--silver);
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .modal-close:hover { opacity: 1; }
  .modal-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1rem; letter-spacing: 4px;
    color: var(--breath);
    text-align: center;
    margin-bottom: 16px;
  }

  /* ── MAP GRID ── */
  #mapGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .map-node {
    background: rgba(20,35,65,0.5);
    border: 1px solid rgba(90,184,176,0.15);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .map-node:hover {
    border-color: var(--air);
    background: rgba(90,184,176,0.1);
  }
  .map-node.current {
    border-color: var(--air);
    background: rgba(90,184,176,0.15);
  }
  .map-node.visited {
    opacity: 0.8;
  }
  .map-node-icon {
    font-size: 1.2rem;
    margin-bottom: 4px;
  }
  .map-node-name {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem; letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--silver);
    opacity: 0.7;
  }
  .map-node-marker {
    position: absolute; bottom: -4px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: var(--air);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #hud { padding: 8px 10px; }
    #hud-realm-name { font-size: 0.65rem; }
    #hud-room-name { display: none; }
    .hud-btn { font-size: 0.5rem; padding: 4px 8px; }
    .room-title { font-size: 1rem; }
    .room-description { font-size: 0.75rem; }
    .portals { bottom: 10px; gap: 6px; }
    .portal-btn { font-size: 0.5rem; padding: 6px 12px; }
    #inventory { bottom: 80px; right: 6px; padding: 6px 10px; }
  }
</style>
</head>
<body>

<!-- Loading veil -->
<div id="loadingVeil">
  <div id="loadingGlyph">𓂝</div>
  <div id="loadingText">The Aerie Vaults await</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-left">
    <div id="hud-realm-name">The Aerie Vaults</div>
    <div id="hud-room-name"></div>
  </div>
  <div id="hud-right">
    <div id="saveDot"></div>
    <button class="hud-btn" id="mapBtn">
      <span class="btn-icon">🗺</span> Map
    </button>
    <button class="hud-btn" id="inventoryBtn">
      <span class="btn-icon">💎</span> Items
    </button>
    <button class="hud-btn" id="saveBtn">
      <span class="btn-icon">↓</span> Save
    </button>
    <button class="hud-btn" id="returnBtn">
      <span class="btn-icon">𐤃</span> Atrium
    </button>
  </div>
</div>

<!-- Realm container (engine renders here) -->
<div id="realmContainer"></div>

<!-- Inventory sidebar -->
<div id="inventory"></div>

<!-- Map Modal -->
<div class="modal" id="mapModal">
  <div class="modal-content">
    <button class="modal-close">✕</button>
    <div class="modal-title">The Aerie Vaults</div>
    <div id="mapGrid"></div>
  </div>
</div>

<!-- Inventory Modal -->
<div class="modal" id="inventoryModal">
  <div class="modal-content">
    <button class="modal-close">✕</button>
    <div class="modal-title">Collected Items</div>
    <div id="inventoryModalContent"></div>
  </div>
</div>

<!-- Engine -->
<script src="../engine/core.js"></script>

<script>
  // ── BOOT ───────────────────────────────────────────────
  // Detect realm from URL, default to air
  const params = new URLSearchParams(window.location.search);
  const realmId = params.get('realm') || 'air';

  // Hide loading veil after engine initializes
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loadingVeil').classList.add('hide');
      setTimeout(() => {
        const veil = document.getElementById('loadingVeil');
        if (veil) veil.style.display = 'none';
      }, 500);
    }, 800);
  });

  // Update HUD room name when room changes
  const observer = new MutationObserver(() => {
    const roomTitle = document.querySelector('.room-title');
    const roomId = document.querySelector('.room-id');
    if (roomTitle) {
      document.getElementById('hud-room-name').textContent = roomTitle.textContent;
    }
    if (roomId) {
      document.getElementById('hud-realm-name').textContent = 'The Aerie Vaults';
    }
  });

  observer.observe(document.getElementById('realmContainer'), {
    childList: true, subtree: true
  });

  // Populate inventory modal content
  const invModal = document.getElementById('inventoryModal');
  if (invModal) {
    invModal.addEventListener('click', () => {
      const invSidebar = document.getElementById('inventory');
      const modalContent = document.getElementById('inventoryModalContent');
      if (invSidebar && modalContent) {
        modalContent.innerHTML = invSidebar.innerHTML;
      }
    });
  }

  console.log(`[Air Realm] Booting... realm=${realmId}`);
</script>
</body>
</html>
