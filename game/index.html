<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Labyrinth · Adzmyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/realm.css">
<style>
  /* ── GAME HUB SPECIFIC ── */
  #hub-container {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  
  #hub-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 400;
    color: var(--breath);
    letter-spacing: 0.3em;
    text-shadow: 0 0 40px rgba(74,122,170,0.5), 0 0 80px rgba(74,122,170,0.2);
    margin-bottom: 0.5rem;
    text-align: center;
  }
  #hub-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem; letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--silver);
    opacity: 0.5;
    margin-bottom: 3rem;
    text-align: center;
  }
  
  /* Realm selector cards */
  #realm-selector {
    display: flex; gap: 20px;
    flex-wrap: wrap; justify-content: center;
    pointer-events: auto;
  }
  .realm-card {
    width: 140px;
    padding: 20px 16px;
    background: rgba(10,20,40,0.6);
    border: 1px solid rgba(184,204,224,0.1);
    border-radius: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s;
    backdrop-filter: blur(8px);
    text-decoration: none;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }
  .realm-card:hover {
    transform: translateY(-6px);
    border-color: rgba(184,204,224,0.3);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  }
  .realm-card.locked {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }
  .realm-card .card-icon {
    font-size: 2rem;
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    border: 1px solid rgba(184,204,224,0.15);
  }
  .realm-card.air .card-icon   { color: var(--air); border-color: rgba(90,184,176,0.3); }
  .realm-card.fire .card-icon  { color: var(--fire); border-color: rgba(212,120,74,0.3); }
  .realm-card.earth .card-icon { color: var(--earth); border-color: rgba(106,148,100,0.3); }
  .realm-card.water .card-icon { color: var(--water); border-color: rgba(74,122,184,0.3); }
  
  .realm-card .card-name {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem; letter-spacing: 2px;
    color: var(--breath);
    text-transform: uppercase;
  }
  .realm-card .card-glyphs {
    font-size: 0.8rem;
    letter-spacing: 3px;
    opacity: 0.5;
  }
  .realm-card.air .card-glyphs   { color: var(--air); }
  .realm-card.fire .card-glyphs  { color: var(--fire); }
  .realm-card.earth .card-glyphs { color: var(--earth); }
  .realm-card.water .card-glyphs { color: var(--water); }
  
  .realm-card .card-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.45rem; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 10px;
  }
  .card-badge.open  { color: var(--unlock); border: 1px solid rgba(138,216,160,0.3); }
  .card-badge.locked { color: var(--gold-dim); border: 1px solid rgba(74,58,42,0.4); }

  /* Bottom nav */
  #hub-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    padding: 1rem 1.5rem 1.5rem;
    display: flex; align-items: center; justify-content: center; gap: 1.5rem;
    background: linear-gradient(0deg, rgba(7,8,15,0.9) 0%, transparent 100%);
    pointer-events: auto;
  }
  .hub-nav-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid rgba(184,204,224,0.15);
    background: transparent;
    color: var(--silver);
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.3s;
    text-decoration: none;
    display: flex; align-items: center; gap: 6px;
  }
  .hub-nav-btn:hover {
    border-color: var(--gold);
    color: var(--breath);
  }
  .hub-nav-btn .nav-icon { font-size: 0.9rem; }

  /* Loading */
  #hub-loading {
    position: fixed; inset: 0; z-index: 100;
    background: var(--void);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
  }
  #hub-loading.hide { opacity: 0; pointer-events: none; }

  @media (max-width: 600px) {
    .realm-card { width: 110px; padding: 14px 10px; }
    .realm-card .card-name { font-size: 0.55rem; }
    #hub-nav { gap: 0.8rem; }
    .hub-nav-btn { font-size: 0.5rem; padding: 4px 10px; }
  }
</style>
</head>
<body>

<!-- Ambient layers -->
<div class="realm-ambient" style="background: radial-gradient(ellipse 60% 40% at 50% 40%, rgba(200,168,74,0.04) 0%, transparent 60%), linear-gradient(180deg, #03050e 0%, #0a1528 40%, #1a3050 100%);"></div>
<canvas id="starfield"></canvas>
<div class="fog-layer"></div>
<div id="glyphParticles"></div>
<div class="realm-vignette"></div>

<!-- Loading -->
<div id="hub-loading">
  <div style="font-size:2rem;color:var(--air);animation:loadPulse 1.5s ease-in-out infinite;">𐤀</div>
</div>

<!-- Hub content -->
<div id="hub-container">
  <div id="hub-title">ADZMYST</div>
  <div id="hub-subtitle">The Labyrinth · Four Realms</div>
  
  <div id="realm-selector">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Bottom nav -->
<nav id="hub-nav">
  <a href="../index.html" class="hub-nav-btn">
    <span class="nav-icon">𐤃</span> Atrium
  </a>
  <a href="map.html" class="hub-nav-btn">
    <span class="nav-icon">🗺</span> Map
  </a>
  <button class="hub-nav-btn" id="resetBtn">
    <span class="nav-icon">↺</span> Reset
  </button>
</nav>

<script>
// ═══════════════════════════════════════════════════════
// GAME HUB — REALM SELECTOR
// Reads unlock state, renders realm cards, navigates
// ═══════════════════════════════════════════════════════

const REALMS = {
  air:   { id:'air',   name:'Air Realm',   subtitle:'The Aerie Vaults',     icon:'𓂝', glyphs:'𐤀 𐤃 𐤆', color:'#5ab8b0', page:'air/index.html' },
  fire:  { id:'fire',  name:'Fire Realm',  subtitle:'The Forge of Prophecy',icon:'𓇋', glyphs:'𐤕 𐤉 𐤀', color:'#d4784a', page:'fire/index.html' },
  earth: { id:'earth', name:'Earth Realm', subtitle:'The Root Cathedral',   icon:'𓌹', glyphs:'𐤎 𐤌 𐤃', color:'#6a9464', page:'earth/index.html' },
  water: { id:'water', name:'Water Realm', subtitle:'The Deep Draw',        icon:'𓏏', glyphs:'𐤌 𐤉 𐤕', color:'#4a7ab8', page:'water/index.html' },
};

// ── STATE ──────────────────────────────────────────────
let unlockedRealms = ['air'];

function loadState() {
  try {
    const saved = localStorage.getItem('adzmyst_atrium_save');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.unlocked) {
        Object.keys(data.unlocked).forEach(key => {
          if (REALMS[key] && data.unlocked[key] && !unlockedRealms.includes(key)) {
            unlockedRealms.push(key);
          }
        });
      }
    }
  } catch(e) {}
}

// ── RENDER ─────────────────────────────────────────────
function renderCards() {
  const selector = document.getElementById('realm-selector');
  selector.innerHTML = Object.values(REALMS).map(realm => {
    const unlocked = unlockedRealms.includes(realm.id);
    return `
      <div class="realm-card ${realm.id} ${unlocked ? '' : 'locked'}" 
           data-realm="${realm.id}"
           ${unlocked ? `onclick="enterRealm('${realm.id}')"` : ''}>
        <div class="card-icon">${realm.icon}</div>
        <div class="card-name">${realm.name}</div>
        <div class="card-glyphs">${realm.glyphs}</div>
        <div class="card-badge ${unlocked ? 'open' : 'locked'}">${unlocked ? 'OPEN' : 'LOCKED'}</div>
      </div>
    `;
  }).join('');
}

function enterRealm(realmId) {
  const realm = REALMS[realmId];
  if (!realm || !unlockedRealms.includes(realmId)) return;
  
  // Fade and navigate
  document.getElementById('hub-loading').classList.remove('hide');
  document.getElementById('hub-loading').style.display = 'flex';
  
  setTimeout(() => {
    window.location.href = realm.page;
  }, 400);
}

// ── STARFIELD ──────────────────────────────────────────
function initStarfield() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  const stars = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height * 0.7,
    r: Math.random() * 1 + 0.3,
    a: Math.random(),
    s: Math.random() * 0.003 + 0.001,
    p: Math.random() * Math.PI * 2,
  }));
  
  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = s.a * (0.4 + 0.6 * Math.sin(t * s.s + s.p));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,242,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

// ── GLYPH PARTICLES ────────────────────────────────────
function initParticles() {
  const container = document.getElementById('glyphParticles');
  const glyphs = ['𐤀','𐤃','𐤆','𐤌','𐤉','𐤎','𐤕','𓂝','𓇋','𓌹','𓏏'];
  
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'glyph-particle';
    p.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = 15 + Math.random() * 25 + 's';
    p.style.animationDelay = Math.random() * 20 + 's';
    p.style.fontSize = 14 + Math.random() * 28 + 'px';
    container.appendChild(p);
  }
}

// ── INIT ───────────────────────────────────────────────
function init() {
  loadState();
  renderCards();
  initStarfield();
  initParticles();
  
  // Hide loading
  setTimeout(() => {
    document.getElementById('hub-loading').classList.add('hide');
    setTimeout(() => {
      const el = document.getElementById('hub-loading');
      if (el) el.style.display = 'none';
    }, 500);
  }, 600);
  
  // Reset button
  document.getElementById('resetBtn')?.addEventListener('click', () => {
    if (confirm('Reset all progress? This cannot be undone.')) {
      localStorage.clear();
      unlockedRealms = ['air'];
      renderCards();
    }
  });
  
  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === '1') enterRealm('air');
    if (e.key === '2' && unlockedRealms.includes('fire'))  enterRealm('fire');
    if (e.key === '3' && unlockedRealms.includes('earth')) enterRealm('earth');
    if (e.key === '4' && unlockedRealms.includes('water')) enterRealm('water');
  });
}

init();
</script>
</body>
</html>
